<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Draw-to-Search Icons</title>
    
    <!-- Font Awesome for rendering resulting icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- p5.js (Required canvas library for ml5 drawing mechanics) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
    
    <!-- ml5.js (Loads DoodleNet Neural Network for high-accuracy shape recognition) -->
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #1e293b;
            margin: 10px 0 5px 0;
            font-size: 24px;
        }

        .status-badge {
            background-color: #e2e8f0;
            color: #475569;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Enforce mobile touch handling so drawing doesn't scroll the web browser layout */
        #canvas-container {
            width: 100%;
            display: flex;
            justify-content: center;
            touch-action: none;
        }

        canvas {
            border: 3px dashed #4f46e5;
            border-radius: 12px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            cursor: crosshair;
            touch-action: none; 
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background-color: #ef4444;
            color: white;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #dc2626;
        }

        .results-section {
            width: 100%;
            text-align: center;
        }

        .ai-guess {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 10px;
        }

        .ai-guess strong {
            color: #4f46e5;
            text-transform: uppercase;
        }

        .results-box {
            border: 2px solid #f1f5f9;
            background-color: #fafafa;
            border-radius: 12px;
            min-height: 110px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 12px;
            padding: 12px;
            box-sizing: border-box;
        }

        .icon-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            width: 75px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .icon-card i {
            font-size: 26px;
            color: #4f46e5;
            margin-bottom: 4px;
        }

        .icon-card span {
            font-size: 9px;
            display: block;
            color: #64748b;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <h1>AI Draw-to-Search Icons</h1>
    <div class="status-badge" id="status">Loading AI Doodle Model...</div>

    <div class="container">
        <!-- CANVAS ELEMENT INSERTED BY P5.JS -->
        <div id="canvas-container"></div>
        
        <button onclick="clearCanvas()">Clear Canvas</button>

        <div class="results-section">
            <div class="ai-guess">AI Detects: <strong id="detectedShape">Nothing yet</strong></div>
            <div class="results-box" id="resultsBox">
                <span style="color: #94a3b8; font-style: italic; font-size: 13px;">Draw a shape (like a cloud, star, triangle, envelope, or line) to find icons!</span>
            </div>
        </div>
    </div>

    <script>
        let classifier;
        let canvasElement;

        // Vector Dictionary matching standard Google QuickDraw output labels to actual Font Awesome configurations
        const iconMapping = {
            "cloud": ["fa-cloud", "fa-cloud-sun", "fa-cloud-rain", "fa-smog"],
            "star": ["fa-star", "fa-star-half-stroke", "fa-clover"],
            "triangle": ["fa-triangle-exclamation", "fa-play", "fa-mountain"],
            "square": ["fa-square", "fa-box", "fa-cube"],
            "circle": ["fa-circle", "fa-moon", "fa-globe"],
            "envelope": ["fa-envelope", "fa-envelope-open", "fa-paper-plane"],
            "line": ["fa-minus", "fa-slash", "fa-grip-lines"],
            "heart": ["fa-heart", "fa-heart-broken", "fa-heart-pulse"],
            "smiley face": ["fa-face-smile", "fa-face-laugh", "fa-face-grin-stars"],
            "sun": ["fa-sun", "fa-brightness", "fa-lightbulb"],
            "moon": ["fa-moon", "fa-circle-half-stroke"]
        };

        // p5.js Setup function to create the drawing zone
        function setup() {
            // Render square canvas dynamically into target placeholder div container
            const canvasWidth = document.getElementById('canvas-container').offsetWidth;
            canvasElement = createCanvas(canvasWidth, 280);
            canvasElement.parent('canvas-container');
            background(255);
            
            // Intialize DoodleNet machine learning framework
            classifier = ml5.imageClassifier('DoodleNet', modelReady);
        }

        function modelReady() {
            document.getElementById('status').innerText = 'AI Model Active - Ready to Draw!';
            document.getElementById('status').style.backgroundColor = '#dcfce7';
            document.getElementById('status').style.color = '#15803d';
        }

        // p5.js continuous loop framework handling user inputs and drawing graphics
        function draw() {
            strokeWeight(12);
            stroke(0);
            
            // When user draws, track mouse or touchscreen drag movements
            if (mouseIsPressed) {
                line(pmouseX, pmouseY, mouseX, mouseY);
                // Trigger real-time asynchronous image analysis while the user draws
                classifyCanvas();
            }
        }

        function clearCanvas() {
            background(255);
            document.getElementById('detectedShape').innerText = "Nothing yet";
            document.getElementById('resultsBox').innerHTML = '<span style="color: #94a3b8; font-style: italic; font-size: 13px;">Draw a shape (like a cloud, star, triangle, envelope, or line) to find icons!</span>';
        }

        function classifyCanvas() {
            classifier.classify(canvasElement, gotResult);
        }

        // Callback handling the results of the neural network prediction
        function gotResult(error, results) {
            if (error) {
                console.error(error);
                return;
            }
            
            // Extract the top guess calculated by the DoodleNet classification output matrix
            const topGuess = results[0].label.toLowerCase();
            
            // Check if the guessed label exists within our Font Awesome directory mapping layout
            if (iconMapping[topGuess]) {
                document.getElementById('detectedShape').innerText = topGuess;
                renderIcons(iconMapping[topGuess]);
            }
        }

        function renderIcons(iconClasses) {
            const resultsBox = document.getElementById('resultsBox');
            resultsBox.innerHTML = ""; // Wipe active layouts

            iconClasses.forEach(iconClass => {
                const iconCard = document.createElement('div');
                iconCard.className = 'icon-card';
                iconCard.innerHTML = `
                    <i class="fa-solid ${iconClass}"></i>
                    <span>${iconClass}</span>
                `;
                resultsBox.appendChild(iconCard);
            });
        }
    </script>
</body>
</html>
