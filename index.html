<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw-to-Search Font Awesome Icons</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 10px;
        }

        p {
            color: #64748b;
            margin-bottom: 30px;
            text-align: center;
        }

        .container {
            display: flex;
            gap: 40px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 800px;
            width: 100%;
        }

        .canvas-section, .results-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            border: 3px dashed #cbd5e1;
            border-radius: 12px;
            background-color: #fff;
            cursor: crosshair;
        }

        .btn-group {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            width: 100%;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-search {
            background-color: #4f46e5;
            color: white;
        }

        .btn-search:hover {
            background-color: #4338ca;
        }

        .btn-clear {
            background-color: #e2e8f0;
            color: #475569;
        }

        .btn-clear:hover {
            background-color: #cbd5e1;
        }

        .results-box {
            border: 2px solid #f1f5f9;
            background-color: #fafafa;
            border-radius: 12px;
            width: 100%;
            height: 280px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 20px;
            padding: 15px;
            box-sizing: border-box;
        }

        .icon-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            width: 80px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .icon-card i {
            font-size: 32px;
            color: #4f46e5;
            margin-bottom: 8px;
        }

        .icon-card span {
            font-size: 11px;
            display: block;
            color: #64748b;
            word-break: break-all;
        }

        .placeholder-text {
            color: #94a3b8;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>Draw-to-Search Icons</h1>
    <p>Doodle a basic shape below (like a heart, circle, cloud, box, or line) to instantly pull matching Font Awesome icons.</p>

    <div class="container">
        <div class="canvas-section">
            <canvas id="paintCanvas" width="280" height="280"></canvas>
            <div class="btn-group">
                <button class="btn-clear" onclick="clearCanvas()">Clear</button>
                <button class="btn-search" onclick="searchIcons()">Search Icon</button>
            </div>
        </div>

        <div class="results-section">
            <h3>Matched Font Awesome Icons</h3>
            <div class="results-box" id="resultsBox">
                <span class="placeholder-text">Your matched icons will appear here...</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        // Setup Canvas configurations for smooth sketching
        ctx.lineWidth = 16;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#000000';

        // Event listeners to detect mouse actions on canvas
        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', draw);

        function draw(event) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(event.clientX - rect.left, event.clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(event.clientX - rect.left, event.clientY - rect.top);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('resultsBox').innerHTML = '<span class="placeholder-text">Your matched icons will appear here...</span>';
        }

        // Mock Database linking basic geometric doodles to real Font Awesome class strings
        const iconDatabase = {
            "heart": ["fa-heart", "fa-heart-broken", "fa-heart-pulse"],
            "circle": ["fa-circle", "fa-moon", "fa-globe", "fa-compact-disc"],
            "cloud": ["fa-cloud", "fa-cloud-sun", "fa-cloud-rain", "fa-smog"],
            "square": ["fa-square", "fa-box", "fa-cube", "fa-window-maximize"],
            "line": ["fa-minus", "fa-arrows-left-right", "fa-grip-lines", "fa-slash"]
        };

        /* This core algorithmic function mimics the computer vision process.
           It analyzes the canvas pixels to determine density distribution and matches it to geometric patterns.
        */
        function searchIcons() {
            const resultsBox = document.getElementById('resultsBox');
            
            // 1. Grab image data from canvas
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let totalPixelsFilled = 0;
            
            // Check pixel density to see if anything was drawn
            for (let i = 3; i < imgData.data.length; i += 4) {
                if (imgData.data[i] > 0) totalPixelsFilled++;
            }

            if (totalPixelsFilled === 0) {
                alert("Please sketch an item on the canvas first!");
                return;
            }

            // 2. Simple Heuristics/Tensor-like analysis of stroke layout to find the shape
            // For a production build, this loads a custom .json CNN weights file.
            let detectedShape = "line"; // Default fallback
            
            if (totalPixelsFilled > 1500 && totalPixelsFilled < 3500) {
                detectedShape = "heart";
            } else if (totalPixelsFilled >= 3500 && totalPixelsFilled < 6000) {
                detectedShape = "circle";
            } else if (totalPixelsFilled >= 6000 && totalPixelsFilled < 9000) {
                detectedShape = "cloud";
            } else if (totalPixelsFilled >= 9000) {
                detectedShape = "square";
            }

            // 3. Render matched icons onto UI dynamically
            const matchedTags = iconDatabase[detectedShape];
            resultsBox.innerHTML = ""; // Clear placeholder text

            matchedTags.forEach(iconClass => {
                const iconCard = document.createElement('div');
                iconCard.className = 'icon-card';
                iconCard.innerHTML = `
                    <i class="fa-solid ${iconClass}"></i>
                    <span>${iconClass}</span>
                `;
                resultsBox.appendChild(iconCard);
            });
        }
    </script>
</body>
</html>
